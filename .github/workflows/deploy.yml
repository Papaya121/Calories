name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote directories
        run: |
          set -euo pipefail
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p /root/Calories/deploy/vps /root/Calories/calories-backend /root/Calories/calories-frontend"

      - name: Sync deploy assets
        run: |
          set -euo pipefail
          rsync -az --delete \
            deploy/vps/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/Calories/deploy/vps/"

      - name: Sync backend source
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "node_modules" \
            --exclude "dist" \
            calories-backend/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/Calories/calories-backend/"

      - name: Sync frontend source
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "node_modules" \
            --exclude ".next" \
            calories-frontend/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/Calories/calories-frontend/"

      - name: Build and restart on VPS
        run: |
          set -euo pipefail
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "bash /root/Calories/deploy/vps/deploy.sh"
